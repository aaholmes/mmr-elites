name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install maturin pytest pytest-cov numpy scipy matplotlib scikit-learn click gymnasium
    
    - name: Build Rust extension
      run: maturin develop --release
    
    - name: Install package
      run: pip install -e .
    
    - name: Run tests
      run: PYTHONPATH=. pytest tests/ -v --cov=mmr_elites --cov-report=xml
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install linters
      run: pip install 'black>=22.0' 'isort>=5.0,<6.0'

    - name: Check formatting
      run: |
        black --check mmr_elites/ tests/ experiments/
        isort --check --profile black mmr_elites/ tests/ experiments/
